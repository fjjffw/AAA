name: 🌐 Auto Translate Docs

on:
  push:
    branches: [main, master]
    paths:
      - "README.md"
      - "docs/**/*.md"
      - ".translate.yml"
      - "scripts/translate.py"
  workflow_dispatch:
    inputs:
      langs:
        description: "languages (comma separated)"
        required: false
        default: "zh-CN,ja,ko,fr,es,de"

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install deep-translator pyyaml

      - name: Debug - list files
        run: |
          echo "=== current dir ==="
          pwd
          echo "=== all files ==="
          ls -la
          echo "=== README exists? ==="
          test -f README.md && echo "YES" || echo "NO"

      - name: Run translate
        run: |
          python scripts/translate.py --langs "zh-CN"

      - name: Debug - list files after translate
        run: |
          echo "=== files after translate ==="
          ls -la README* 2>/dev/null || echo "(no README files?)"
          ls -la *.md 2>/dev/null || echo "(no .md files?)"

      - name: Commit translations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.zh-CN.md 2>/dev/null || echo "WARN: README.zh-CN.md not found"
          git status
          if git diff --staged --quiet; then
            echo "SKIP: nothing to commit"
          else
            git commit -m "auto: translate README to zh-CN [skip ci]"
            git push
            echo "DONE: pushed!"
          fi
