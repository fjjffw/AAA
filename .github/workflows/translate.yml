name: 🌐 Auto Translate Docs

on:
  push:
    branches: [main, master]
    paths:
      - "README.md"
      - "docs/**/*.md"
      - ".translate.yml"
      - "scripts/translate.py"
  workflow_dispatch:
    inputs:
      langs:
        description: "target languages (comma separated)"
        required: false
        default: "zh-CN,ja,ko,fr,es,de"

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install deep-translator pyyaml

      - name: Run translation
        env:
          TARGET_LANGS: ${{ github.event.inputs.langs || '' }}
        run: |
          if [ -n "$TARGET_LANGS" ]; then
            python scripts/translate.py --langs "$TARGET_LANGS"
          else
            python scripts/translate.py
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 关键修复：通配符不加引号，让 shell 展开
          shopt -s nullglob
          files=( README.*.md docs/*.*.md )
          shopt -u nullglob

          if [ ${#files[@]} -eq 0 ]; then
            echo "SKIP: no translated files found"
            exit 0
          fi

          for f in "${files[@]}"; do
            # 跳过原始 README.md 本身
            [ "$f" = "README.md" ] && continue
            git add "$f"
            echo "  added: $f"
          done

          if git diff --staged --quiet; then
            echo "SKIP: nothing new to commit"
          else
            git commit -m "auto: update translations [skip ci]"
            git push
            echo "DONE: translations pushed!"
          fi
